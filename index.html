<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css">
    
  </head>
  <body>
    <h1>Commute Calculator</h1>
    <div>
      <form>
        <label for="preparation-time"
          >How long do you take to prepare? (In minutes)</label
        ><input
          type="number"
          id="preparation-time"
          name="preparation-time"
          placeholder="30"
        />
        <br />
        <label for="commute-time"
          >How long does your commute take? (In hours)</label
        ><input
          type="number"
          id="commute-time"
          name="commute-time"
          placeholder="2"
        />
        <br />
        <label for="arrival-time">What time do you want to arrive?</label
        ><input
          type="time"
          id="arrival-time"
          name="arrival-time"
          placeholder="1:00 PM"
        />
        <br />
        <button type="submit">Calculate</button>
      </form>
    </div>
  </body>
</html>
