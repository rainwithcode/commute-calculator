<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Commute Calculator</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <div class="card">
      <h1 class="card-title">Commute Calculator</h1>
      <form class="card-form">
        <label for="user-prep"
          >How long do you take to prepare? (In minutes)</label
        ><input
          type="number"
          id="user-prep"
          name="user-prep"
          placeholder="30"
        />
        <br />
        <label for="user-commute"
          >How long does your commute take? (In hours)</label
        ><input id="user-commute" name="user-commute" placeholder="2" />
        <br />
        <label for="user-arrive">What time do you want to arrive?</label
        ><input
          type="time"
          id="user-arrive"
          name="user-arrive"
          placeholder="1:00 PM"
        />
        <br />
        <button type="submit">Calculate</button>
        <div id="results" hidden>
          <p>You should prepare by: <span id="result-prep"></span></p>
          <p>You should leave by: <span id="result-leave"></span></p>
          <p>You should arrive by: <span id="result-arrive"></span></p>
        </div>
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
