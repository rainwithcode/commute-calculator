<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <h1>Commute Calculator</h1>
    <div>
      <form>
        <label for="user-preparation"
          >How long do you take to prepare? (In minutes)</label
        ><input
          type="number"
          id="user-preparation"
          name="user-preparation"
          placeholder="30"
        />
        <br />
        <label for="user-time"
          >How long does your commute take? (In hours)</label
        ><input type="number" id="user-time" name="user-time" placeholder="2" />
        <br />
        <label for="user-arrival">What time do you want to arrive?</label
        ><input
          type="time"
          id="user-arrival"
          name="user-arrival"
          placeholder="1:00 PM"
        />
        <br />
        <button type="submit">Calculate</button>
        <div hidden>
          <p>You should prepare by: <span id="preparation-time"></span></p>
          <p>You should leave by: <span id="leave-time"></span></p>
          <p>You should arrive by: <span id="arrival-time"></span></p>
        </div>
      </form>
    </div>
    <script src="script.js"></script>
  </body>
</html>
